<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Landing Page</title>
  </head>
  <body>
    <div class="top">
      <div class="header">
        <div class="header-logo">Header Logo</div>
        <div class="header-links">
          <div class="header-link">header link one</div>
          <div class="header-link">header link two</div>
          <div class="header-link">header link three</div>
        </div>
      </div>
      <div class="hero">
        <div class="hero-text">
          <div class="hero-main-text">This website is awesome</div>
          <div class="hero-secondary-text">
            This website has some subtext that goes here under the main title.
            It's a smaller font and the color is lower contrast
          </div>
          <div class="hero-signup-button"><button>Sign up</button></div>
        </div>
        <div class="hero-image hero-secondary-text">
          this is a placeholder for an image
        </div>
      </div>
    </div>
  </body>
</html>
